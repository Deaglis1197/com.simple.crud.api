spring.application.name=com.simple.crud.api


spring.datasource.url=jdbc:postgresql://localhost:5432/my-test-database
spring.datasource.username=postgres
spring.datasource.password=mysecretpassword1881*!

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.ddl-show-sql=true

spring.jpa.show-sql=true

# JWT — replace secret with a secure Base64-encoded 256-bit key before going to production
app.jwt.secret=dGhpcy1pcy1hLXZlcnktc2VjcmV0LWtleS10aGF0LW11c3QtYmUtY2hhbmdlZA==
app.jwt.expiration=86400000

# Notes configuration
app.notes.max-per-user=10

# Documents configuration
app.documents.upload-dir=uploads/documents
app.documents.max-file-size-mb=50
app.documents.max-file-count=10
app.documents.allowed-types=pdf,png,jpg,jpeg,docx,txt